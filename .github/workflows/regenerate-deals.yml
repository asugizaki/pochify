name: Regenerate Deal Pages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose what to regenerate"
        required: true
        default: "outdated"
        type: choice
        options:
          - outdated
          - all

jobs:
  regenerate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run regeneration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "all" ]; then
            npm run regenerate:all
          else
            npm run regenerate:outdated
          fi

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "regenerate deal pages" || exit 0
          git push
