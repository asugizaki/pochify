name: Deal Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate pages and ingest deals
        run: node src/processDeals.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_AI: ${{ secrets.TELEGRAM_AI }}
          TELEGRAM_SAAS: ${{ secrets.TELEGRAM_SAAS }}
          TELEGRAM_GENERAL: ${{ secrets.TELEGRAM_GENERAL }}

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/deals docs/categories docs/sitemap.xml docs/robots.txt docs/index.html docs/faq.html docs/privacy.html docs/terms.html
          git commit -m "update generated site pages" || exit 0
          git push

      - name: Wait for GitHub Pages to update
        run: sleep 30

      - name: Send Telegram messages
        run: node src/sendTelegramDeals.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_AI: ${{ secrets.TELEGRAM_AI }}
          TELEGRAM_SAAS: ${{ secrets.TELEGRAM_SAAS }}
          TELEGRAM_GENERAL: ${{ secrets.TELEGRAM_GENERAL }}
