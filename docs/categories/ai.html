  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --card-border: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-dark: #04130a;
      --link: #93c5fd;
      --btn-dark: #0f172a;
      --price: #f8fafc;
      --old-price: #94a3b8;
      --badge-bg: #14532d;
      --badge-text: #dcfce7;
      --sale-bg: #b91c1c;
      --sale-text: #fff1f2;
      --hero-grad-1: #111827;
      --hero-grad-2: #0f172a;
      --hero-grad-3: #1e293b;
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(11, 18, 32, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1e293b;
    }

    .nav-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand { color: var(--text); text-decoration: none; font-weight: bold; font-size: 22px; }
    .menu-toggle {
      display: none;
      background: transparent;
      border: 1px solid #334155;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 20px;
      cursor: pointer;
    }

    .nav-links { display: flex; flex-wrap: wrap; gap: 14px; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 15px; }
    .nav-links a:hover, .brand:hover { color: var(--text); }

    .container { max-width: 1180px; margin: 0 auto; padding: 28px 20px 80px; }
    .narrow { max-width: 980px; }

    h1 { font-size: 42px; line-height: 1.15; margin: 0 0 14px; }
    h2, h3 { margin-top: 0; margin-bottom: 12px; }

    .eyebrow {
      color: var(--accent);
      font-weight: bold;
      letter-spacing: 0.08em;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sub { color: var(--muted); font-size: 19px; margin-bottom: 24px; }
    .breadcrumbs { margin-bottom: 18px; color: var(--muted); font-size: 14px; }
    .breadcrumbs a { color: var(--link); text-decoration: none; }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      margin: 20px 0;
    }

    .hero-image {
      display: block;
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      background: #0f172a;
      margin-bottom: 24px;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .price-box {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
      margin: 12px 0 0;
    }

    .price-current { font-size: 34px; font-weight: bold; color: var(--price); }
    .price-old { font-size: 18px; color: var(--old-price); text-decoration: line-through; }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: var(--badge-bg);
      color: var(--badge-text);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    .badge-sale {
      background: var(--sale-bg);
      color: var(--sale-text);
    }

    .cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }

    .cta {
      display: inline-block;
      background: var(--accent);
      color: var(--accent-dark);
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: bold;
    }

    .secondary, button.secondary {
      display: inline-block;
      color: var(--text);
      background: transparent;
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 12px;
      border: 1px solid #334155;
      font: inherit;
      cursor: pointer;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .hero-panel {
      background:
        radial-gradient(circle at top left, rgba(34,197,94,0.18), transparent 30%),
        linear-gradient(135deg, var(--hero-grad-1), var(--hero-grad-2), var(--hero-grad-3));
      border: 1px solid #243041;
      border-radius: 22px;
      padding: 30px;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(34,197,94,0.08);
      filter: blur(10px);
    }

    .hero-title {
      font-size: 48px;
      line-height: 1.04;
      margin: 0 0 14px;
      max-width: 10ch;
      position: relative;
      z-index: 1;
    }

    .hero-copy {
      color: #cbd5e1;
      font-size: 18px;
      max-width: 52ch;
      margin-bottom: 22px;
      position: relative;
      z-index: 1;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      background: rgba(15,23,42,0.72);
      border: 1px solid #273449;
      border-radius: 16px;
      padding: 16px;
      min-width: 0;
    }

    .hero-stat strong {
      display: block;
      font-size: 22px;
      color: #fff;
      margin-bottom: 4px;
    }

    .hero-stat span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      display: block;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 28px 0 8px;
    }

    .section-header p {
      margin: 0;
      color: var(--muted);
    }

    .deal-card-link,
    .deal-card-link:visited,
    .deal-card-link:hover,
    .deal-card-link:active {
      display: block;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .deal-card-link:hover {
      transform: translateY(-4px);
    }

    .deal-card {
      position: relative;
      height: 100%;
      min-height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 8px;
    }

    .deal-card-link:hover .deal-card {
      border-color: #31465f;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
    }

    .deal-card img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 6px;
      border: 1px solid #243041;
      background: #0f172a;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .deal-card h3 {
      font-size: 18px;
      line-height: 1.3;
      margin: 0;
      color: var(--text);
    }

    .card-price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0;
    }

    .card-price-current {
      font-weight: bold;
      font-size: 20px;
      color: var(--price);
    }

    .card-price-old {
      color: var(--old-price);
      text-decoration: line-through;
      font-size: 14px;
    }

    .inline-link {
      display: inline-block;
      margin-top: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }

    .floating-share {
      position: fixed;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .floating-share a,
    .floating-share button {
      width: 42px;
      height: 42px;
      border: 1px solid #334155;
      background: #111827;
      color: #fff;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      padding: 0;
    }

    .floating-share svg {
      width: 18px;
      height: 18px;
    }

    .share-card {
      display: none;
    }

    .footer {
      margin-top: 48px;
      color: #64748b;
      font-size: 14px;
    }

    .footer a { color: var(--link); text-decoration: none; }
    .footer-links { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .empty { color: var(--muted); padding: 10px 0; }

    @media (max-width: 760px) {
      .menu-toggle { display: inline-block; }
      .nav-links { display: none; width: 100%; flex-direction: column; padding-top: 10px; }
      .nav-links.open { display: flex; }
      .nav-wrap { flex-wrap: wrap; }
      h1 { font-size: 34px; }
      .price-current { font-size: 28px; }

      .hero-panel {
        padding: 24px;
      }

      .hero-title {
        font-size: 34px;
        max-width: none;
      }

      .hero-stats {
        grid-template-columns: 1fr;
      }

      .floating-share {
        display: none;
      }

      .share-card {
        display: block;
      }
    }
  </style>
  
  
</head>
<body>
  
    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="/">Pochify</a>
        <button class="menu-toggle" aria-label="Toggle menu" onclick="toggleMenu()">☰</button>
        <nav class="nav-links" id="siteNav">
          <a href="/deals/">Deals</a>
          <a href="/categories/ai.html">AI</a>
          <a href="/categories/saas.html">SaaS</a>
          <a href="https://t.me/pochify" target="_blank" rel="noopener">Telegram</a>
        </nav>
      </div>
    </header>
  
  
      <div class="container">
        <div class="breadcrumbs">
          <a href="/">Home</a> / <a href="/deals/">Deals</a> / AI
        </div>

        <h1>AI Tools</h1>
        <div class="sub">Browse the latest high-quality deal pages from Pochify.</div>

        <div id="dealsGrid" class="grid"><div class="empty">Loading deals…</div></div>

        
    <div class="footer">
      <p><a href="https://pochify.com">Pochify</a> curates AI tools, SaaS products, and useful software finds.</p>
      <p class="footer-links">
        <a href="/faq.html">FAQ</a>
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms & Conditions</a>
      </p>
    </div>
  
      </div>

      <script>
        function card(item) {
          return `
            <a class="deal-card-link" href="/deals/${item.slug}.html">
              <div class="card deal-card">
                ${item.og_image ? '<img src="' + item.og_image + '" alt="' + item.name + '" loading="lazy" />' : ''}
                <h3>${item.name}</h3>
                <div class="card-price-row">
                  ${item.current_price ? '<span class="card-price-current">$' + item.current_price + '</span>' : ''}
                  ${item.original_price ? '<span class="card-price-old">$' + item.original_price + '</span>' : ''}
                  ${item.discount_percent ? '<span class="badge badge-sale">' + item.discount_percent + '% off</span>' : ''}
                  ${item.offer_type === 'lifetime' ? '<span class="badge">Lifetime deal</span>' : ''}
                </div>
              </div>
            </a>
          `;
        }

        async function loadDeals() {
          const container = document.getElementById("dealsGrid");
          const url = "https://go.pochify.com/api/public/deals?limit=50&category=ai";
          try {
            const res = await fetch(url);
            const data = await res.json();
            const items = data.items || [];
            container.innerHTML = items.length ? items.map(card).join("") : '<div class="empty">No deals found.</div>';
          } catch {
            container.innerHTML = '<div class="empty">Deals are temporarily unavailable.</div>';
          }
        }

        loadDeals();
      </script>
    
  
    <script>
      function toggleMenu() {
        const nav = document.getElementById("siteNav");
        if (nav) nav.classList.toggle("open");
      }

      async function copyText(text, label) {
        try {
          await navigator.clipboard.writeText(text);
          alert(label || "Link copied");
        } catch {
          alert("Could not copy link");
        }
      }
    </script>
  
</body>
